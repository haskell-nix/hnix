name: "Quality checks"

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  formatting:
    name: "Formatting (fourmolu)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
      - name: "Check Haskell formatting"
        run: |
          nix shell nixpkgs#haskellPackages.fourmolu nixpkgs#findutils -c \
            sh -c 'find src main tests benchmarks -name "*.hs" -exec fourmolu --mode check {} +'
      - name: "Check shell script formatting"
        run: |
          nix shell nixpkgs#shfmt -c shfmt -d build.sh

  shellcheck:
    name: "ShellCheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Lint shell scripts"
        run: shellcheck build.sh

  warnings:
    name: "Build (warnings as errors)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10"
      - uses: cachix/install-nix-action@v25
      - run: sudo apt install libsodium-dev
      - run: cabal v2-update
      - name: "Build with -Werror"
        run: >
          cabal v2-build
          --enable-tests --enable-benchmarks
          --disable-optimization --enable-deterministic
          --ghc-options=-Werror

  haddock:
    name: "Documentation (Haddock)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10"
      - uses: cachix/install-nix-action@v25
      - run: sudo apt install libsodium-dev
      - run: cabal v2-update
      - name: "Build documentation"
        run: >
          cabal v2-haddock
          --disable-optimization --enable-deterministic
      - name: "Upload documentation"
        uses: actions/upload-artifact@v4
        with:
          name: haddock-docs
          path: dist-newstyle/build/**/doc/

  coverage:
    name: "Code coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10"
      - uses: cachix/install-nix-action@v25
      - run: sudo apt install libsodium-dev
      - run: cabal v2-update
      - name: "Build and test with coverage"
        run: |
          cabal v2-configure --enable-tests --enable-coverage --disable-optimization
          cabal v2-build
          cabal v2-test
      - name: "Upload coverage report"
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: dist-newstyle/build/**/hpc/

  benchmarks:
    name: "Benchmarks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10"
      - uses: cachix/install-nix-action@v25
      - run: sudo apt install libsodium-dev
      - run: cabal v2-update
      - name: "Run benchmarks"
        run: |
          cabal v2-build --enable-benchmarks --disable-optimization
          cabal v2-bench 2>&1 | tee benchmark-results.txt
      - name: "Upload benchmark results"
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt

  nix-build:
    name: "Nix build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          extra_nix_config: |
            accept-flake-config = true
      - name: "Build with Nix"
        run: nix build --print-build-logs
